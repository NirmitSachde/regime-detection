name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python
        run: uv python install 3.12

      - name: Sync deps (docs extra)
        run: uv sync --extra docs

      - name: Build code reference (pdoc)
        run: ./scripts/build_docs.sh docs-site

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r web/. _site/
          mkdir -p _site/reference
          cp -r docs-site/. _site/reference/
          # Friendly index at /reference if pdoc nests under src/regime
          if [ -d _site/reference/regime ]; then
            ln -s regime _site/reference/_root || true
          fi

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
