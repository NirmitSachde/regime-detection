version: 2

sources:
  - name: raw
    description: "Raw zone — Parquet partitions exposed as DuckDB views by regime.warehouse.bootstrap()."
    schema: raw
    tables:
      - name: prices
        description: "Daily OHLCV from yfinance. One row per (ticker, date)."
        columns:
          - name: ticker
            tests: [not_null]
          - name: date
            tests: [not_null]
          - name: close
            tests: [not_null]
          - name: adj_close
            tests: [not_null]
      - name: macro
        description: "FRED macro series. One row per (series_id, date)."
        columns:
          - name: series_id
            tests: [not_null]
          - name: date
            tests: [not_null]
